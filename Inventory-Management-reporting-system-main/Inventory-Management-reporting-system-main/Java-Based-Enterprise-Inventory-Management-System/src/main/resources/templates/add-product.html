<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2 th:text="${product.id} != null ? 'Edit Product' : 'Add Product'"></h2>

    <form th:action="@{/products/save}" method="post" th:object="${product}">

        <!-- ✅ IMPORTANT FOR EDIT -->
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Reorder Level</label>
            <input type="number" th:field="*{reorderLevel}" class="form-control"/>
        </div>

        <button class="btn btn-primary">Save</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
