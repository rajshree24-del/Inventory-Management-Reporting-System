<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Products</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* THEME VARIABLES */

        :root{
        --bg:#0f172a;
        --text:#e2e8f0;
        --navbar:#1e293b;
        --table:#1e293b;
        --table-head:#334155;
        --hover:#2a3648;
        --input:#1e293b;
        --border:#334155;
        }

        body.light{
        --bg:#f4f6fb;
        --text:#111827;
        --navbar:#ffffff;
        --table:#ffffff;
        --table-head:#e5e7eb;
        --hover:#f1f5f9;
        --input:#ffffff;
        --border:#e5e7eb;
        }

        /* GLOBAL */

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Segoe UI, sans-serif;
        }

        body{
        background:var(--bg);
        color:var(--text);
        transition:0.3s;
        }

        /* NAVBAR */

        .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:var(--navbar);
        padding:14px 40px;
        box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        .logo{
        font-size:20px;
        font-weight:600;
        }

        .nav-links{
        display:flex;
        align-items:center;
        }

        .nav-links a{
        margin-left:12px;
        padding:8px 14px;
        border-radius:6px;
        text-decoration:none;
        color:var(--text);
        transition:0.25s;
        }

        .nav-links a:hover{
        background:var(--hover);
        }

        /* THEME BUTTON */

        .theme-btn{
        margin-left:12px;
        background:#334155;
        border:none;
        color:white;
        padding:8px 12px;
        border-radius:6px;
        cursor:pointer;
        }

        .theme-btn:hover{
        background:#475569;
        }

        /* MAIN */

        .container{
        width:92%;
        margin:auto;
        margin-top:30px;
        }

        .title{
        font-size:26px;
        margin-bottom:20px;
        font-weight:600;
        }

        /* TOP BAR */

        .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        }

        /* SEARCH */

        .search-box{
        padding:9px 14px;
        width:260px;
        border-radius:6px;
        border:1px solid var(--border);
        background:var(--input);
        color:var(--text);
        outline:none;
        }

        /* ADD BUTTON */

        .add-btn{
        background:#2563eb;
        color:white;
        padding:9px 16px;
        border-radius:6px;
        text-decoration:none;
        font-size:14px;
        transition:0.25s;
        }

        .add-btn:hover{
        background:#1d4ed8;
        }

        /* TABLE */

        table{
        width:100%;
        border-collapse:collapse;
        background:var(--table);
        border-radius:8px;
        overflow:hidden;
        }

        th{
        background:var(--table-head);
        color:var(--text);
        padding:12px;
        text-align:left;
        font-size:14px;
        }

        td{
        padding:12px;
        border-bottom:1px solid var(--border);
        }

        tr:hover{
        background:var(--hover);
        }

        /* QUANTITY COLORS */

        .low-stock{
        color:#ef4444;
        font-weight:600;
        }

        .medium-stock{
        color:#f59e0b;
        font-weight:600;
        }

        .good-stock{
        color:#22c55e;
        font-weight:600;
        }

        /* ACTION BUTTONS */

        .plus-btn,
        .minus-btn,
        .edit-btn,
        .delete-btn{
        padding:5px 10px;
        border-radius:5px;
        text-decoration:none;
        font-size:13px;
        margin-right:6px;
        color:white;
        }

        .plus-btn{
        background:#2563eb;
        }

        .minus-btn{
        background:#dc2626;
        }

        .edit-btn{
        background:#059669;
        }

        .delete-btn{
        background:#b91c1c;
        }

        .plus-btn:hover{
        background:#1d4ed8;
        }

        .minus-btn:hover{
        background:#b91c1c;
        }

        .edit-btn:hover{
        background:#047857;
        }

        .delete-btn:hover{
        background:#991b1b;
        }

    </style>

</head>

<body>

<div class="navbar">

    <div class="logo">Inventory System</div>

    <div class="nav-links">

        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/products}">Products</a>
        <a th:href="@{/low-stock}">Low Stock</a>
        <a th:href="@{/logs}">Logs</a>
        <a th:href="@{/logout}">Logout</a>

        <button onclick="toggleTheme()" class="theme-btn">
            <i class="fa fa-moon"></i>
        </button>

    </div>

</div>

<div class="container">

    <div class="title">Products</div>

    <div class="top-bar">

        <input type="text"
               id="searchInput"
               class="search-box"
               placeholder="Search product..."
               onkeyup="searchProduct()">

        <a th:href="@{/products/add}" class="add-btn">
            <i class="fa fa-plus"></i> Add Product
        </a>

    </div>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="product : ${products}">

            <td th:text="${product.id}"></td>

            <td th:text="${product.name}"></td>

            <td>₹ <span th:text="${product.price}"></span></td>

            <td>

<span th:class="${product.quantity < 5} ? 'low-stock' :
(${product.quantity < 20} ? 'medium-stock' : 'good-stock')"
      th:text="${product.quantity}">
</span>

            </td>

            <td>

                <a th:href="@{'/products/update/' + ${product.id} + '?quantity=1&type=ADD'}"
                   class="plus-btn">+</a>

                <a th:href="@{'/products/update/' + ${product.id} + '?quantity=1&type=REMOVE'}"
                   class="minus-btn">-</a>

                <a th:href="@{'/products/edit/' + ${product.id}}"
                   class="edit-btn">Edit</a>

                <a th:href="@{'/products/delete/' + ${product.id}}"
                   class="delete-btn"
                   onclick="return confirm('Are you sure you want to delete this product?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script>

    /* SEARCH */

    function searchProduct(){

    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();

    let table = document.querySelector("table");
    let tr = table.getElementsByTagName("tr");

    for(let i=1;i<tr.length;i++){

    let td = tr[i].getElementsByTagName("td")[1];

    if(td){

    let txtValue = td.textContent || td.innerText;

    if(txtValue.toLowerCase().indexOf(filter) > -1){
    tr[i].style.display="";
    }else{
    tr[i].style.display="none";
    }

    }

    }

    }

    /* THEME TOGGLE */

    function toggleTheme(){

    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
    localStorage.setItem("theme","light");
    }else{
    localStorage.setItem("theme","dark");
    }

    }

    /* LOAD SAVED THEME */

    window.onload=function(){

    const savedTheme = localStorage.getItem("theme");

    if(savedTheme === "light"){
    document.body.classList.add("light");
    }

    }

</script>

</body>
</html>
