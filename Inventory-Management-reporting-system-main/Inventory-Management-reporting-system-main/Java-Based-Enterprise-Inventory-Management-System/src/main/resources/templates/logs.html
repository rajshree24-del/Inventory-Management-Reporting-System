<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Stock Logs</h2>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Product ID</th>
            <th>Type</th>
            <th>Quantity</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="log : ${logs}">
            <td th:text="${log.productId}"></td>
            <td th:text="${log.changeType}"></td>
            <td th:text="${log.quantityChanged}"></td>
            <td th:text="${log.changeDate}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
