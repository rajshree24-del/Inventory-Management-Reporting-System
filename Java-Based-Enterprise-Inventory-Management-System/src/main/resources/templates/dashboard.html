<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Inventory Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Segoe UI, sans-serif;
        }

        body{
        display:flex;
        background:#0f172a;
        color:white;
        min-height:100vh;
        }

        /* SIDEBAR */

        .sidebar{
        width:240px;
        background:#020617;
        padding:20px;
        display:flex;
        flex-direction:column;
        }

        .sidebar h2{
        color:#6366f1;
        margin-bottom:35px;
        }

        .sidebar a{
        text-decoration:none;
        color:#cbd5f5;
        padding:12px;
        border-radius:8px;
        margin-bottom:10px;
        display:flex;
        align-items:center;
        gap:10px;
        transition:0.3s;
        }

        .sidebar a:hover{
        background:#6366f1;
        color:white;
        }

        /* MAIN */

        .main{
        flex:1;
        padding:30px;
        }

        /* TOP BAR */

        .topbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
        }

        .search{
        background:#1e293b;
        padding:10px 15px;
        border-radius:8px;
        border:none;
        color:white;
        width:250px;
        }

        .user{
        background:#6366f1;
        width:40px;
        height:40px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        }

        /* STATS */

        .stats{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:20px;
        margin-bottom:30px;
        }

        .stat-card{
        background:#1e293b;
        padding:22px;
        border-radius:12px;
        transition:0.3s;
        }

        .stat-card:hover{
        transform:translateY(-5px);
        }

        .stat-title{
        color:#94a3b8;
        font-size:14px;
        }

        .stat-value{
        font-size:28px;
        font-weight:bold;
        margin-top:5px;
        }

        /* ACTION BUTTONS */

        .actions{
        margin-bottom:25px;
        }

        .btn{
        padding:10px 16px;
        border-radius:8px;
        border:none;
        cursor:pointer;
        color:white;
        margin-right:10px;
        }

        .btn-csv{background:#334155;}
        .btn-logs{background:#6366f1;}

        /* GRID */

        .dashboard-grid{
        display:grid;
        grid-template-columns:2fr 1fr;
        gap:20px;
        }

        .panel{
        background:#1e293b;
        padding:20px;
        border-radius:12px;
        }

        .panel h3{
        margin-bottom:15px;
        }

        /* QUICK BUTTONS */

        .quick-btn{
        display:block;
        text-decoration:none;
        padding:10px;
        border-radius:8px;
        margin-bottom:10px;
        color:white;
        }

        .q-blue{background:#6366f1;}
        .q-orange{background:#f59e0b;}
        .q-green{background:#10b981;}

        .quick-btn:hover{
        opacity:0.9;
        }

        .chart-box{
        background:white;
        padding:10px;
        border-radius:10px;
        }

        /* CHATBOT */

        #chatbotBtn{
        position:fixed;
        bottom:25px;
        right:25px;
        background:#6366f1;
        width:55px;
        height:55px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:24px;
        cursor:pointer;
        z-index:9999;
        box-shadow:0 5px 20px rgba(0,0,0,0.5);
        }

        #chatbot{
        position:fixed;
        bottom:90px;
        right:25px;
        width:330px;
        background:#020617;
        border-radius:10px;
        display:none;
        flex-direction:column;
        overflow:hidden;
        z-index:9999;
        box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header{
        background:#6366f1;
        padding:12px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        font-weight:600;
        }

        .chat-body{
        height:260px;
        overflow-y:auto;
        padding:10px;
        font-size:14px;
        }

        .bot-msg{
        background:#1e293b;
        padding:8px;
        border-radius:6px;
        margin-bottom:6px;
        }

        .user-msg{
        background:#6366f1;
        padding:8px;
        border-radius:6px;
        margin-bottom:6px;
        text-align:right;
        }

        .chat-input{
        display:flex;
        border-top:1px solid #334155;
        }

        .chat-input input{
        flex:1;
        padding:10px;
        border:none;
        background:#020617;
        color:white;
        }

        .chat-input button{
        background:#6366f1;
        border:none;
        padding:10px;
        color:white;
        cursor:pointer;
        }

        .ai-suggestions{
        padding:10px;
        border-top:1px solid #334155;
        display:flex;
        flex-direction:column;
        gap:6px;
        }

        .ai-btn{
        background:#6366f1;
        border:none;
        padding:8px;
        border-radius:6px;
        color:white;
        cursor:pointer;
        font-size:13px;
        }

        .ai-btn:hover{
        background:#4f46e5;
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h2>Inventory</h2>

    <a th:href="@{/dashboard}">
        <i class="fa fa-chart-line"></i> Dashboard
    </a>

    <a th:href="@{/products}">
        <i class="fa fa-box"></i> Products
    </a>

    <a th:href="@{/low-stock}">
        <i class="fa fa-exclamation-triangle"></i> Low Stock
    </a>

    <a th:href="@{/logs}">
        <i class="fa fa-clock"></i> Logs
    </a>

    <a th:href="@{/logout}">
        <i class="fa fa-sign-out-alt"></i> Logout
    </a>

</div>

<!-- MAIN -->

<div class="main">

    <div class="topbar">

        <h1>Dashboard</h1>

        <input class="search" placeholder="Search...">

        <div class="user">
            <i class="fa fa-user"></i>
        </div>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">
            <div class="stat-title">Total Products</div>
            <div class="stat-value" th:text="${totalProducts}">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Inventory Value</div>
            <div class="stat-value" th:text="'₹ ' + ${totalInventoryValue}">0</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Low Stock</div>
            <div class="stat-value" th:text="${lowStockCount}">0</div>
        </div>

    </div>

    <!-- EXPORT BUTTONS -->

    <div class="actions">

        <a th:href="@{/reports/export}">
            <button class="btn btn-csv">Export CSV</button>
        </a>

        <a th:href="@{/reports/logs/export}">
            <button class="btn btn-logs">Export Logs CSV</button>
        </a>

    </div>

    <!-- GRID -->

    <div class="dashboard-grid">

        <div class="panel">

            <h3>Inventory Analytics</h3>

            <div class="chart-box">
                <canvas id="inventoryChart"></canvas>
            </div>

        </div>

        <div class="panel">

            <h3>Quick Actions</h3>

            <a th:href="@{/products}" class="quick-btn q-blue">Manage Products</a>
            <a th:href="@{/low-stock}" class="quick-btn q-orange">Check Low Stock</a>
            <a th:href="@{/logs}" class="quick-btn q-green">View Stock Logs</a>

        </div>

    </div>

</div>

<!-- CHATBOT -->

<div id="chatbotBtn">🤖</div>

<div id="chatbot">

    <div class="chat-header">
        AI Inventory Assistant
        <span onclick="toggleChat()" style="cursor:pointer;">✖</span>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="bot-msg">Hello 👋 Ask me anything about inventory.</div>
    </div>

    <div class="chat-input">
        <input id="chatInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="ai-suggestions">
        <button class="ai-btn" onclick="quickAsk('Show low stock products')">Show low stock products</button>
        <button class="ai-btn" onclick="quickAsk('Which product has highest quantity?')">Highest quantity product</button>
        <button class="ai-btn" onclick="quickAsk('Total inventory value')">Inventory value</button>
        <button class="ai-btn" onclick="quickAsk('Inventory summary')">Inventory summary</button>
    </div>

</div>

<script>

    const ctx=document.getElementById('inventoryChart');

    const totalProducts=[[${totalProducts}]];
    const lowStock=[[${lowStockCount}]];
    const inventoryValue=[[${totalInventoryValue}]]/1000;

    new Chart(ctx,{
    type:'bar',
    data:{
    labels:['Products','Low Stock','Value (₹k)'],
    datasets:[{
    data:[totalProducts,lowStock,inventoryValue],
    backgroundColor:['#6366f1','#f59e0b','#10b981']
    }]
    }
    });

    /* CHATBOT */

    document.getElementById("chatbotBtn").onclick=toggleChat;

    function toggleChat(){
    const bot=document.getElementById("chatbot");
    bot.style.display = bot.style.display==="flex"?"none":"flex";
    }

    function quickAsk(question){
    document.getElementById("chatInput").value = question;
    sendMessage();
    }

    document.getElementById("chatInput").addEventListener("keypress",function(e){
    if(e.key==="Enter") sendMessage();
    });

    async function sendMessage(){

    const input=document.getElementById("chatInput");
    const msg=input.value.trim();

    if(msg==="") return;

    const body=document.getElementById("chatBody");

    body.innerHTML += `<div class="user-msg">${msg}</div>`;

    input.value="";

    try{

    const res = await fetch("/api/ai/chat",{
    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    body.innerHTML += `<div class="bot-msg">${data.reply}</div>`;

    }catch(err){

    body.innerHTML += `<div class="bot-msg">⚠ AI server error</div>`;

    }

    body.scrollTop = body.scrollHeight;

    }

</script>

</body>
</html>
